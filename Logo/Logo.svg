        fill="#D4AF37" opacity="0.8"/>
  <path d="M95,260 Q70,210 95,170 Q110,145 135,150 Q155,155 150,180 Q145,210 160,235 Q175,260 165,280 Q155,300 135,295 Q110,290 100,270 Q92,265 95,260Z" 
