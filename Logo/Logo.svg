  <!-- Golden laurel wreath - right side -->
  <path d="M412,256 Q432,200 402,160 Q382,130 352,140 Q332,150 342,180 Q352,210 332,230 Q312,250 322,270 Q332,290 352,290 Q382,290 392,270 Q402,250 412,256Z" 
