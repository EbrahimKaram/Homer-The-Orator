  <circle cx="372" cy="110" r="4" fill="#D4AF37" opacity="0.4"/>
  <circle cx="80" cy="330" r="3" fill="#D4AF37" opacity="0.3"/>
  <circle cx="432" cy="330" r="3" fill="#D4AF37" opacity="0.3"/>
  
  <!-- Text: HOMER -->
  <text x="256" y="390" font-family="Georgia, serif" font-size="42" 
        fill="#D4AF37" text-anchor="middle" font-weight="bold" letter-spacing="6">HOMER</text>
  
  <!-- Text: THE ORATOR -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="20" 
        fill="#D4AF37" text-anchor="middle" letter-spacing="8" opacity="0.8">THE ORATOR</text>
  
  <!-- Small BOT badge -->
  <rect x="360" y="375" width="70" height="28" rx="14" fill="#D4AF37" opacity="0.9"/>
  <text x="395" y="395" font-family="Arial, sans-serif" font-size="14" 
