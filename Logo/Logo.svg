  <line x1="235" y1="185" x2="277" y2="185" stroke="#D4AF37" stroke-width="2"/>
  <line x1="235" y1="200" x2="277" y2="200" stroke="#D4AF37" stroke-width="2"/>
  <line x1="235" y1="215" x2="277" y2="215" stroke="#D4AF37" stroke-width="2"/>
  <line x1="235" y1="230" x2="277" y2="230" stroke="#D4AF37" stroke-width="2"/>
  <line x1="235" y1="245" x2="277" y2="245" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Mic holder arc -->
  <path d="M200,280 Q256,310 312,280" stroke="#D4AF37" stroke-width="6" fill="none"/>
  
  <!-- Soundwaves from top -->
  <path d="M230,130 Q240,115 256,120 Q272,115 282,130" stroke="#D4AF37" stroke-width="3" fill="none"/>
  <path d="M215,115 Q230,95 256,100 Q282,95 297,115" stroke="#D4AF37" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M200,100 Q220,75 256,80 Q292,75 312,100" stroke="#D4AF37" stroke-width="3" fill="none" opacity="0.5"/>
  
  <!-- Small stars/dots -->
